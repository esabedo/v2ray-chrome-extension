name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-test-package:
    name: ${{ matrix.os }} build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install npm dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Build Go agent binary
        run: npm run agent:build:go

      - name: Install sing-box (macOS)
        if: runner.os == 'macOS'
        run: npm run singbox:install:macos
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Smoke stack (macOS)
        if: runner.os == 'macOS'
        run: npm run smoke:stack

      - name: Package macOS PKG
        if: runner.os == 'macOS'
        run: npm run package:macos

      - name: Upload macOS package artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: dist/install/macos/*.pkg
          if-no-files-found: error

      - name: Install WiX CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install sing-box (Windows)
        if: runner.os == 'Windows'
        run: npm run singbox:install:windows
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Smoke stack (Windows)
        if: runner.os == 'Windows'
        run: npm run smoke:stack

      - name: Package Windows MSI
        if: runner.os == 'Windows'
        run: npm run package:windows

      - name: List Windows package output
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path dist\install\windows -Recurse | Format-Table FullName,Length

      - name: Upload Windows MSI artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/install/windows/*.msi
          if-no-files-found: error
