<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V2Ray Controller</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>V2Ray Proxy</h1>
        <span id="statusPill" class="status-pill status-idle">Idle</span>
      </header>

      <section class="field">
        <label class="label" for="profileNameInput">Profile Name</label>
        <input id="profileNameInput" type="text" placeholder="Optional name" />
      </section>

      <section class="field">
        <label class="label" for="vlessInput">VLESS URL</label>
        <textarea id="vlessInput" rows="5" placeholder="vless://..."></textarea>
        <p id="validationHint" class="validation-hint">Paste a valid VLESS URL to save profile.</p>
      </section>

      <section class="field">
        <label class="label" for="profileSelect">Saved Profiles</label>
        <div class="profile-row">
          <select id="profileSelect"></select>
          <button id="useProfileButton" type="button" class="btn btn-secondary">Use</button>
          <button id="deleteProfileButton" type="button" class="btn btn-ghost">Delete</button>
        </div>
      </section>

      <div class="row">
        <button id="saveButton" type="button" class="btn btn-secondary">Save</button>
        <button id="connectButton" type="button" class="btn btn-primary">Connect</button>
        <button id="disconnectButton" type="button" class="btn btn-ghost">Disconnect</button>
      </div>

      <pre id="status" class="status-text">Ready</pre>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
